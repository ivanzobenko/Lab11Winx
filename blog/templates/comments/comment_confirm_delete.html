{% extends 'base.html' %}

{% block title %}Удалить комментарий?{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto text-center">
        <h3>Удалить комментарий?</h3>
        <p class="text-muted">«{{ comment.text|truncatechars:50 }}»</p>
        <form method="post" class="mt-3">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Да, удалить</button>
            <a href="{% url 'post_detail' comment.post.pk %}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
