{% extends 'base.html' %}

{% block title %}Вход{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto">
        <h2>Вход</h2>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_username">Имя пользователя:</label>
                {{ form.username }}
            </div>
            <div class="mb-3">
                <label for="id_password">Пароль:</label>
                {{ form.password }}
            </div>
            <button type="submit" class="btn btn-primary">Войти</button>
            <a href="{% url 'register' %}" class="btn btn-link">Нет аккаунта?</a>
        </form>
    </div>
</div>
{% endblock %}
